name: Upload Small Models Phase 1
on:
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Install tools
        run: pip install -q huggingface_hub

      - name: Download and Upload Models
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python3 << 'EOF'
          import os
          from huggingface_hub import HfApi, snapshot_download
          
          api = HfApi(token=os.environ["HF_TOKEN"])
          repo = "shababdd11/sultan-models"
          
          models = [
              ("openai/clip-vit-base-patch32", "analysis/clip-vit-base-patch32"),
              ("briaai/RMBG-1.4", "segmentation/u2net-portrait"),
              ("h94/IP-Adapter-FaceID", "relighting/dpr"),
              ("lllyasviel/IC-Light", "relighting/switchlight"),
          ]
          
          for source, target in models:
              print(f"⏳ تحميل {source}...")
              try:
                  path = snapshot_download(source)
                  api.upload_folder(folder_path=path, path_in_repo=target, repo_id=repo)
                  print(f"✅ {target} done")
              except Exception as e:
                  print(f"❌ {source} فشل: {e}")
          
          print("🚀 المرحلة الأولى اكتملت!")
          EOF
