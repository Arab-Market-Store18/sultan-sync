import os
import requests

# استخدام الروابط المباشرة (هذه هي المصادر الوحيدة التي تعمل حالياً)
# u2net يتم تحميله من المصدر المباشر الذي لا يزال متاحاً
# pirenderer يتم تحميله من المستودع الأصلي للمؤلف على GitHub
URLS = {
    "u2net": "https://github.com/xuebinqin/U-2-Net/raw/master/saved_models/u2net/u2net.pth",
    "pirenderer": "https://github.com/RenYurui/PIRenderer/raw/master/checkpoints/pirenderer_weights.pth"
}

def download_confirmed_sources():
    for name, url in URLS.items():
        print(f"جاري تحميل {name}...")
        try:
            response = requests.get(url, stream=True)
            if response.status_code == 200:
                with open(f"{name}.pth", "wb") as f:
                    for chunk in response.iter_content(chunk_size=8192):
                        f.write(chunk)
                print(f"تم تحميل {name} بنجاح.")
            else:
                print(f"فشل التحميل: الرابط {url} يعطي خطأ {response.status_code}")
        except Exception as e:
            print(f"خطأ أثناء التحميل: {e}")

if __name__ == "__main__":
    download_confirmed_sources()
