name: Download LivePortrait
on:
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Install tools
        run: pip install -q huggingface_hub

      - name: Download and Upload LivePortrait
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python3 << 'EOF'
          import os
          from huggingface_hub import HfApi, snapshot_download
          
          api = HfApi(token=os.environ["HF_TOKEN"])
          repo = "shababdd11/sultan-models"
          
          print("⏳ تحميل LivePortrait...")
          try:
              path = snapshot_download("KwaiVGI/LivePortrait")
              api.upload_folder(folder_path=path, path_in_repo="pose/liveportrait", repo_id=repo)
              print("✅ liveportrait done")
          except Exception as e:
              print(f"❌ فشل: {e}")
          
          print("🚀 تم!")
          EOF
