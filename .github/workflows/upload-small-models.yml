name: Download u2net and pirenderer from GitHub
on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Install requests
        run: pip install -q requests huggingface_hub

      - name: Download and Upload Models
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python3 << 'EOF'
          import os
          import requests
          from huggingface_hub import HfApi

          api = HfApi(token=os.environ["HF_TOKEN"])
          repo = "shababdd11/sultan-models"

          URLS = {
              "u2net": "https://github.com/xuebinqin/U-2-Net/raw/master/saved_models/u2net/u2net.pth",
              "pirenderer": "https://github.com/RenYurui/PIRenderer/raw/master/checkpoints/pirenderer_weights.pth"
          }

          targets = {
              "u2net": "segmentation/u2net/u2net.pth",
              "pirenderer": "pose/pirenderer/pirenderer.pth"
          }

          for name, url in URLS.items():
              print(f"⏳ تحميل {name}...")
              try:
                  response = requests.get(url, stream=True, timeout=60)
                  if response.status_code == 200:
                      filepath = f"{name}.pth"
                      with open(filepath, "wb") as f:
                          for chunk in response.iter_content(chunk_size=8192):
                              f.write(chunk)
                      api.upload_file(
                          path_or_fileobj=filepath,
                          path_in_repo=targets[name],
                          repo_id=repo
                      )
                      print(f"✅ {name} done")
                  else:
                      print(f"❌ {name} فشل: {response.status_code}")
              except Exception as e:
                  print(f"❌ {name} خطأ: {e}")
          
          print("🚀 تم!")
          EOF
