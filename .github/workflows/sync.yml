name: Full Cloud Sync
on:
  workflow_dispatch:

jobs:
  transfer:
    runs-on: ubuntu-latest
    steps:
      - name: Install Tools
        run: pip install huggingface_hub

      - name: Prepare and Download
        run: |
          mkdir -p models/swap models/insightface/models/buffalo_l
          wget -q -O models/swap/inswapper_128.onnx https://huggingface.co/ezioruan/inswapper_128.onnx/resolve/main/inswapper_128.onnx || true
          wget -q -O models/insightface/models/buffalo_l/det_10g.onnx https://huggingface.co/MonsterMMORPG/SECourses/resolve/main/det_10g.onnx || true

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # تسجيل الدخول أولاً باستخدام سطر الأوامر لتفادي أخطاء البرمجية
          huggingface-cli login --token $HF_TOKEN --add-to-git-credential
          
          # الرفع باستخدام بايثون مع التأكد من قراءة المتغير البيئي مباشرة
          python -c "
          import os
          from huggingface_hub import HfApi
          api = HfApi()
          api.upload_folder(
              folder_path='models',
              repo_id='shababdd11/sultan-models',
              repo_type='model'
          )"
