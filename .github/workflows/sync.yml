name: Upload retinaface
on:
  workflow_dispatch:

jobs:
  transfer:
    runs-on: ubuntu-latest
    steps:
      - name: Download and Upload retinaface
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          mkdir -p detection
          pip install -q huggingface_hub
          
          wget -q https://github.com/facefusion/facefusion-assets/releases/download/models-3.0.0/retinaface_10g.onnx -O detection/retinaface.onnx
          echo "✅ Downloaded: $(ls -lh detection/retinaface.onnx | awk '{print $5}')"
          
          python3 << 'EOF'
          import os
          from huggingface_hub import HfApi
          api = HfApi(token=os.environ["HF_TOKEN"])
          api.upload_folder(
              folder_path="detection",
              path_in_repo="detection",
              repo_id="shababdd11/sultan-models",
              repo_type="model"
          )
          print("✅ Uploaded!")
          EOF
