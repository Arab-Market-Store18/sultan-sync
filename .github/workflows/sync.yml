name: Fix landmark_3d_68.onnx
on:
  workflow_dispatch:

jobs:
  transfer:
    runs-on: ubuntu-latest
    steps:
      - name: Upload landmark model
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          mkdir -p buffalo_l
          pip install -q huggingface_hub
          
          # تحميل الملف الصحيح
          wget -q --show-progress https://huggingface.co/deepinsight/insightface/resolve/main/models/buffalo_l/landmark_3d_68.onnx -O buffalo_l/landmark_3d_68.onnx
          echo "✅ Downloaded: $(ls -lh buffalo_l/landmark_3d_68.onnx | awk '{print $5}')"
          
          # رفع واستبدال الملف الفارغ
          python3 << 'EOF'
          import os
          from huggingface_hub import HfApi
          api = HfApi(token=os.environ["HF_TOKEN"])
          
          # رفع الملف مباشرة (يستبدل القديم)
          api.upload_file(
              path_or_fileobj="buffalo_l/landmark_3d_68.onnx",
              path_in_repo="insightface/models/buffalo_l/landmark_3d_68.onnx",
              repo_id="shababdd11/sultan-models",
              repo_type="model"
          )
          print("✅ landmark_3d_68.onnx uploaded!")
          EOF
