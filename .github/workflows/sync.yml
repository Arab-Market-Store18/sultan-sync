name: Sultan Verified Final
on:
  workflow_dispatch:

jobs:
  transfer:
    runs-on: ubuntu-latest
    steps:
      - name: Install Tools
        run: pip install -U huggingface_hub

      - name: Verified Download from Source
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          hf auth login --token $HF_TOKEN
          
          # التحميل باستخدام المسار الذي أكدته التقارير الآن
          # سنحمل مجلد buffalo_l بالكامل لضمان عدم ضياع أي ملف
          hf download public-data/insightface --include "models/buffalo_l/*" --local-dir ./models/insightface

          # الرفع النهائي لمستودعك
          hf upload shababdd11/sultan-models ./models . --repo-type model
