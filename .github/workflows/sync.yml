name: Sultan Test - Break 729MB
on:
  workflow_dispatch:

jobs:
  transfer:
    runs-on: ubuntu-latest
    steps:
      - name: Install Tools
        run: pip install huggingface_hub

      - name: Download One Real File
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          hf auth login --token $HF_TOKEN
          
          # إنشاء المجلد المطلوب
          mkdir -p models/insightface/models/buffalo_l
          
          # تحميل ملف واحد فقط (حجمه حوالي 227MB) برابط مباشر
          # هذا الرابط سيسحب بيانات حقيقية وليس صفحة ويب
          wget -q -c -O models/insightface/models/buffalo_l/det_10g.onnx https://huggingface.co/MonsterMMORPG/SECourses/resolve/main/det_10g.onnx

          # رفع الملف وتحديث الأصفار
          hf upload shababdd11/sultan-models ./models . --repo-type model
