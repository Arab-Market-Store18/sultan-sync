name: Full Cloud Sync
on:
  workflow_dispatch:

jobs:
  transfer:
    runs-on: ubuntu-latest
    steps:
      - name: Install Tools
        run: pip install huggingface_hub

      - name: Prepare and Download
        run: |
          mkdir -p models/swap models/insightface/models/buffalo_l models/gfpgan models/codeformer models/detection

          # استخدام --continue و --tries لضمان استمرار التحميل حتى لو فشل رابط واحد
          wget -q --show-progress --continue --tries=3 -O models/swap/inswapper_128.onnx https://huggingface.co/ezioruan/inswapper_128.onnx/resolve/main/inswapper_128.onnx || true
          wget -q --show-progress --continue --tries=3 -O models/insightface/models/buffalo_l/det_10g.onnx https://huggingface.co/MonsterMMORPG/SECourses/resolve/main/det_10g.onnx || true
          wget -q --show-progress --continue --tries=3 -O models/insightface/models/buffalo_l/w600k_r50.onnx https://huggingface.co/MonsterMMORPG/SECourses/resolve/main/w600k_r50.onnx || true
          wget -q --show-progress --continue --tries=3 -O models/gfpgan/GFPGANv1.4.pth https://huggingface.co/public-data/face-upscale/resolve/main/GFPGANv1.4.pth || true
          wget -q --show-progress --continue --tries=3 -O models/codeformer/codeformer.pth https://huggingface.co/sczhou/CodeFormer/resolve/main/CodeFormer.pth || true

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python -c "
          from huggingface_hub import HfApi
          import os
          api = HfApi()
          # سيتم رفع الملفات الموجودة فقط وتجاهل الروابط التي فشلت
          api.upload_folder(
              folder_path='models',
              repo_id='shababdd11/sultan-models',
              repo_type='model',
              token=os.environ['HF_TOKEN']
          )"
