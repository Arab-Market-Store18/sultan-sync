name: Sultan Test - Fixed Path
on:
  workflow_dispatch:

jobs:
  transfer:
    runs-on: ubuntu-latest
    steps:
      - name: Install Tools
        run: pip install huggingface_hub

      - name: Download From Exact Path
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          hf auth login --token $HF_TOKEN
          
          # إنشاء المجلد المحلي في جهاز GitHub
          mkdir -p models/insightface/models/buffalo_l
          
          # التحميل مع تحديد المسار الصحيح داخل المستودع (include)
          hf download MonsterMMORPG/SECourses \
            --include "models/insightface/models/buffalo_l/det_10g.onnx" \
            --local-dir . \
            --local-dir-use-symlinks False

          # الرفع النهائي
          hf upload shababdd11/sultan-models ./models . --repo-type model
