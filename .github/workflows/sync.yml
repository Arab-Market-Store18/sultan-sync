name: Create recognition folder
on:
  workflow_dispatch:

jobs:
  transfer:
    runs-on: ubuntu-latest
    steps:
      - name: Create folder
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          mkdir -p recognition
          touch recognition/.gitkeep
          pip install -q huggingface_hub
          
          python3 << 'EOF'
          import os
          from huggingface_hub import HfApi
          api = HfApi(token=os.environ["HF_TOKEN"])
          api.upload_folder(
              folder_path="recognition",
              path_in_repo="recognition",
              repo_id="shababdd11/sultan-models",
              repo_type="model"
          )
          print("✅ recognition folder created!")
          EOF
