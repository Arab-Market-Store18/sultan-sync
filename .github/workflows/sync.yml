name: Create New Folders in Sultan Models
on:
  workflow_dispatch:

jobs:
  create-folders:
    runs-on: ubuntu-latest
    steps:
      - name: Create folders on Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          pip install -q huggingface_hub
          
          python3 << 'EOF'
          import os
          from huggingface_hub import HfApi
          
          api = HfApi(token=os.environ["HF_TOKEN"])
          repo_id = "shababdd11/sultan-models"
          
          folders = [
              "analysis/.gitkeep",
              "generation/.gitkeep",
              "relighting/.gitkeep",
          ]
          
          for folder in folders:
              # إنشاء ملف مؤقت
              with open(".gitkeep", "w") as f:
                  f.write("")
              
              api.upload_file(
                  path_or_fileobj=".gitkeep",
                  path_in_repo=folder,
                  repo_id=repo_id,
                  commit_message=f"إنشاء مجلد {folder.split('/')[0]}"
              )
              print(f"✅ تم إنشاء {folder}")
          
          print("🚀 تم إنشاء جميع المجلدات الجديدة بنجاح!")
          EOF
