name: Upload real_esrgan_x4plus
on:
  workflow_dispatch:

jobs:
  transfer:
    runs-on: ubuntu-latest
    steps:
      - name: Upload model
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          pip install -q huggingface_hub
          wget -q https://github.com/xinntao/Real-ESRGAN/releases/download/v0.1.0/RealESRGAN_x4plus.pth
          echo "✅ Downloaded: $(ls -lh RealESRGAN_x4plus.pth | awk '{print $5}')"
          
          python3 << 'EOF'
          import os
          from huggingface_hub import HfApi
          api = HfApi(token=os.environ["HF_TOKEN"])
          api.upload_file(
              path_or_fileobj="RealESRGAN_x4plus.pth",
              path_in_repo="enhancement/real_esrgan_x4plus.pth",
              repo_id="shababdd11/sultan-models",
              repo_type="model"
          )
          print("✅ Done!")
          EOF
