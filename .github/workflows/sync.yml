name: Sultan Final Verified - May 2026
on:
  workflow_dispatch:

jobs:
  transfer:
    runs-on: ubuntu-latest
    steps:
      - name: Install Tools
        run: pip install -U "huggingface_hub" # تحديث للأداة الأحدث

      - name: Verified Download
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          hf auth login --token $HF_TOKEN
          
          # التحميل بالصيغة المختصرة والرسمية (لا تستخدم --include لملف واحد)
          # هكذا يطلبها النظام الآن: hf download [repo] [filename] --local-dir [path]
          hf download MonsterMMORPG/SECourses models/insightface/models/buffalo_l/det_10g.onnx --local-dir ./models

          # الرفع النهائي
          hf upload shababdd11/sultan-models ./models . --repo-type model
