name: Sultan Test - Official Download
on:
  workflow_dispatch:

jobs:
  transfer:
    runs-on: ubuntu-latest
    steps:
      - name: Install Tools
        run: pip install huggingface_hub

      - name: Download Using Official API
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          hf auth login --token $HF_TOKEN
          
          # إنشاء المجلد
          mkdir -p models/insightface/models/buffalo_l
          
          # التحميل باستخدام الأداة الرسمية (هذا لا يعطي Exit Code 8)
          huggingface-cli download MonsterMMORPG/SECourses det_10g.onnx --local-dir models/insightface/models/buffalo_l --local-dir-use-symlinks False

          # الرفع
          hf upload shababdd11/sultan-models ./models . --repo-type model
