name: Sultan Model Sync 2026
on:
  workflow_dispatch: # هذا السطر هو الذي سيظهر لك زر "Run workflow"

jobs:
  sync_models:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python 3.9
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Hugging Face Hub
        run: pip install huggingface_hub

      - name: Execute Sync Script
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }} # تأكد من إضافة التوكن في Settings > Secrets
        run: python fix_models.py
