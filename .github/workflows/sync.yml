name: Upload facenet
on:
  workflow_dispatch:

jobs:
  transfer:
    runs-on: ubuntu-latest
    steps:
      - name: Upload model
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          pip install -q huggingface_hub
          wget -q https://huggingface.co/deepinsight/insightface/resolve/main/models/buffalo_l/w600k_r50.onnx -O facenet.onnx
          echo "✅ Downloaded: $(ls -lh facenet.onnx | awk '{print $5}')"
          
          python3 << 'EOF'
          import os
          from huggingface_hub import HfApi
          api = HfApi(token=os.environ["HF_TOKEN"])
          api.upload_file(
              path_or_fileobj="facenet.onnx",
              path_in_repo="recognition/facenet.onnx",
              repo_id="shababdd11/sultan-models",
              repo_type="model"
          )
          print("✅ Done!")
          EOF
