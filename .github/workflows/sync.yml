name: Sultan Verified GFPGAN
on:
  workflow_dispatch:

jobs:
  transfer:
    runs-on: ubuntu-latest
    steps:
      - name: Download and Upload GFPGAN
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          mkdir -p ./gfpgan
          wget -q https://github.com/TencentARC/GFPGAN/releases/download/v1.3.0/GFPGANv1.4.pth -O ./gfpgan/GFPGANv1.4.pth
          echo "✅ Downloaded: $(ls -lh ./gfpgan/GFPGANv1.4.pth | awk '{print $5}')"
          
          pip install -q huggingface_hub
          
          python3 << 'EOF'
          import os
          from huggingface_hub import HfApi
          
          api = HfApi(token=os.environ["HF_TOKEN"])
          api.upload_file(
              path_or_fileobj="./gfpgan/GFPGANv1.4.pth",
              path_in_repo="GFPGANv1.4.pth",
              repo_id="shababdd11/sultan-models",
              repo_type="model"
          )
          print("✅ Uploaded to shababdd11/sultan-models")
          EOF
