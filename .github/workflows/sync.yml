name: Sultan Test - New HF Tool
on:
  workflow_dispatch:

jobs:
  transfer:
    runs-on: ubuntu-latest
    steps:
      - name: Install Tools
        run: pip install huggingface_hub # لضمان وجود المكتبة البرمجية

      - name: Download Using New HF Command
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          hf auth login --token $HF_TOKEN
          
          # إنشاء المجلد
          mkdir -p models/insightface/models/buffalo_l
          
          # الصيغة الجديدة والمباشرة التي طلبها منك النظام في السجل
          hf download MonsterMMORPG/SECourses det_10g.onnx --local-dir models/insightface/models/buffalo_l

          # الرفع النهائي
          hf upload shababdd11/sultan-models ./models . --repo-type model
