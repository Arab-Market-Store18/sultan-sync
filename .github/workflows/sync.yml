name: Upload recognition models
on:
  workflow_dispatch:

jobs:
  transfer:
    runs-on: ubuntu-latest
    steps:
      - name: Upload recognition models
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          mkdir -p recognition
          pip install -q huggingface_hub
          
          wget -q https://huggingface.co/deepinsight/insightface/resolve/main/models/buffalo_l/w600k_r50.onnx -O recognition/arcface.onnx
          echo "✅ arcface: $(ls -lh recognition/arcface.onnx | awk '{print $5}')"
          
          wget -q https://huggingface.co/deepinsight/insightface/resolve/main/models/buffalo_l/w600k_r50.onnx -O recognition/facenet.onnx
          echo "✅ facenet: $(ls -lh recognition/facenet.onnx | awk '{print $5}')"
          
          python3 << 'EOF'
          import os
          from huggingface_hub import HfApi
          api = HfApi(token=os.environ["HF_TOKEN"])
          api.upload_folder(
              folder_path="recognition",
              path_in_repo="recognition",
              repo_id="shababdd11/sultan-models",
              repo_type="model"
          )
          print("✅ Done!")
          EOF
