name: Sultan Test - Simplified Path
on:
  workflow_dispatch:

jobs:
  transfer:
    runs-on: ubuntu-latest
    steps:
      - name: Install Tools
        run: pip install -U huggingface_hub

      - name: Download Single File Correctly
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          hf auth login --token $HF_TOKEN
          
          # سنقوم بتحميل الملف من مستودع يحتوي عليه في الصفحة الرئيسية مباشرة لتجنب خطأ "File not found"
          # سنستخدم مستودع 'sultan/insightface-models' إذا كان متاحاً أو أي مستودع بسيط
          hf download sultan/insightface-models det_10g.onnx --local-dir ./models/insightface/models/buffalo_l

          # الرفع النهائي
          hf upload shababdd11/sultan-models ./models . --repo-type model
