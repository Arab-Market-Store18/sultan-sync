name: Create segmentation folder and upload models
on:
  workflow_dispatch:

jobs:
  transfer:
    runs-on: ubuntu-latest
    steps:
      - name: Create folder and upload to sultan-models
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          pip install -q huggingface_hub
          
          python3 << 'EOF'
          import os
          from huggingface_hub import HfApi

          token = os.environ["HF_TOKEN"]
          api = HfApi(token=token)
          
          # إنشاء ملف مؤقت لإنشاء المجلد
          os.makedirs("segmentation", exist_ok=True)
          
          # إنشاء ملف .gitkeep لضمان إنشاء المجلد
          with open("segmentation/.gitkeep", "w") as f:
              f.write("")
          
          print("📁 Uploading segmentation folder...")
          api.upload_folder(
              folder_path="segmentation",
              path_in_repo="segmentation",
              repo_id="shababdd11/sultan-models",
              repo_type="model"
          )
          print("✅ segmentation folder created in sultan-models!")
          EOF
