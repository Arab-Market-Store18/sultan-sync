name: Fix segmentation models
on:
  workflow_dispatch:

jobs:
  transfer:
    runs-on: ubuntu-latest
    steps:
      - name: Download and Upload segmentation models
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          mkdir -p segmentation
          
          # تحميل مع التوثيق
          wget --header="Authorization: Bearer ${HF_TOKEN}" --show-progress https://huggingface.co/facefusion/models/resolve/main/bisenet.onnx -O segmentation/bisenet.onnx
          echo "✅ bisenet: $(ls -lh segmentation/bisenet.onnx | awk '{print $5}')"
          
          wget --header="Authorization: Bearer ${HF_TOKEN}" --show-progress https://huggingface.co/facefusion/models/resolve/main/unet.onnx -O segmentation/unet.onnx
          echo "✅ unet: $(ls -lh segmentation/unet.onnx | awk '{print $5}')"
          
          pip install -q huggingface_hub
          
          python3 << 'EOF'
          import os
          from huggingface_hub import HfApi
          api = HfApi(token=os.environ["HF_TOKEN"])
          api.upload_folder(
              folder_path="segmentation",
              path_in_repo="segmentation",
              repo_id="shababdd11/sultan-models",
              repo_type="model"
          )
          print("✅ Uploaded segmentation models")
          EOF
