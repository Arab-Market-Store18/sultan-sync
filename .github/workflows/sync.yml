name: Sultan GFPGAN Upload
on:
  workflow_dispatch:

jobs:
  transfer:
    runs-on: ubuntu-latest
    steps:
      - name: Download and Upload GFPGAN
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # تحميل الملف
          mkdir -p gfpgan
          wget -q https://github.com/TencentARC/GFPGAN/releases/download/v1.3.0/GFPGANv1.4.pth -O gfpgan/GFPGANv1.4.pth
          echo "✅ Downloaded: $(ls -lh gfpgan/GFPGANv1.4.pth | awk '{print $5}')"
          
          pip install -q huggingface_hub
          
          # رفع المجلد
          python3 << 'EOF'
          import os
          from huggingface_hub import HfApi

          api = HfApi(token=os.environ["HF_TOKEN"])

          api.upload_folder(
              folder_path="gfpgan",
              path_in_repo="gfpgan",
              repo_id="shababdd11/sultan-models",
              repo_type="model"
          )
          print("✅ Uploaded gfpgan/GFPGANv1.4.pth")
          EOF
