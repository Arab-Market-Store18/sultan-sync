name: Full Cloud Sync - REAL DATA
on:
  workflow_dispatch:

jobs:
  transfer:
    runs-on: ubuntu-latest
    steps:
      - name: Install Tools
        run: pip install huggingface_hub

      - name: Download and Push ALL Models
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          hf auth login --token $HF_TOKEN
          
          # 1. إنشاء الهيكل الكامل
          mkdir -p models/swap models/insightface/models/buffalo_l models/gfpgan models/codeformer models/detection models/segmentation models/enhancement models/recognition

          # 2. تحميل نماذج التبديل (Swap) - أحجام حقيقية
          hf download ezioruan/inswapper_128.onnx inswapper_128.onnx --local-dir models/swap
          hf download public-data/face-swap hyperswap_256_1c.onnx --local-dir models/swap || true

          # 3. تحميل مجموعة Buffalo_L كاملة (InsightFace) - لإنهاء مشكلة الـ 0 Bytes
          # سيسحب الملفات: det_10g, w600k_r50, 2d106det, genderage, landmark_3d_68
          hf download deepinsight/insightface --local-dir models/insightface --repo-type dataset || true

          # 4. تحميل نماذج التحسين (Quality)
          hf download sczhou/CodeFormer codeformer.pth --local-dir models/codeformer
          hf download public-data/face-upscale GFPGANv1.4.pth --local-dir models/gfpgan || true

          # 5. تحميل نماذج الكشف والتعرف (Detection & Recognition)
          hf download public-data/face-detection yolov5s.pt yolov8n-face.pt retinaface.onnx --local-dir models/detection || true
          hf download public-data/face-recognition facenet.onnx arcface.onnx --local-dir models/recognition || true

          # 6. الرفع النهائي الشامل لمستودع sultan-models
          hf upload shababdd11/sultan-models ./models . --repo-type model
