name: Delete duplicate GFPGAN
on:
  workflow_dispatch:

jobs:
  delete:
    runs-on: ubuntu-latest
    steps:
      - name: Delete file
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          pip install -q huggingface_hub
          
          python3 << 'EOF'
          import os
          from huggingface_hub import HfApi
          api = HfApi(token=os.environ["HF_TOKEN"])
          api.delete_file(
              path_in_repo="GFPGANv1.4.pth",
              repo_id="shababdd11/sultan-models",
              repo_type="model"
          )
          print("✅ Deleted!")
          EOF
