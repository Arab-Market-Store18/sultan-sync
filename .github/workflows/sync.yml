name: Fix segmentation models
on:
  workflow_dispatch:

jobs:
  transfer:
    runs-on: ubuntu-latest
    steps:
      - name: Download and Upload segmentation models
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          mkdir -p segmentation
          
          pip install -q huggingface_hub
          
          python3 << 'EOF'
          import os
          from huggingface_hub import hf_hub_download, HfApi

          token = os.environ["HF_TOKEN"]
          
          # تحميل bisenet.onnx
          try:
              hf_hub_download(
                  repo_id="facefusion/models",
                  filename="bisenet.onnx",
                  token=token,
                  local_dir="segmentation",
                  local_dir_use_symlinks=False
              )
              print(f"✅ bisenet: {os.path.getsize('segmentation/bisenet.onnx')/1024/1024:.1f} MB")
          except Exception as e:
              print(f"❌ bisenet: {e}")

          # تحميل unet.onnx
          try:
              hf_hub_download(
                  repo_id="facefusion/models",
                  filename="unet.onnx",
                  token=token,
                  local_dir="segmentation",
                  local_dir_use_symlinks=False
              )
              print(f"✅ unet: {os.path.getsize('segmentation/unet.onnx')/1024/1024:.1f} MB")
          except Exception as e:
              print(f"❌ unet: {e}")
          
          # رفع الملفات
          api = HfApi(token=token)
          api.upload_folder(
              folder_path="segmentation",
              path_in_repo="segmentation",
              repo_id="shababdd11/sultan-models",
              repo_type="model"
          )
          print("✅ Uploaded segmentation models")
          EOF
