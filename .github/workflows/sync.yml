name: Fix landmark_3d_68
on:
  workflow_dispatch:

jobs:
  transfer:
    runs-on: ubuntu-latest
    steps:
      - name: Fix model
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          pip install -q huggingface_hub
          
          python3 << 'EOF'
          import os
          from huggingface_hub import HfApi, hf_hub_download

          token = os.environ["HF_TOKEN"]
          api = HfApi(token=token)

          # تحميل من InsightFace مباشرة
          path = hf_hub_download(
              repo_id="deepinsight/insightface",
              filename="models/buffalo_l/landmark_3d_68.onnx",
              token=token
          )
          print(f"✅ Downloaded: {os.path.getsize(path)/1024/1024:.1f} MB")

          # رفع إلى مستودعك
          api.upload_file(
              path_or_fileobj=path,
              path_in_repo="insightface/models/buffalo_l/landmark_3d_68.onnx",
              repo_id="shababdd11/sultan-models",
              repo_type="model"
          )
          print("✅ Done!")
          EOF
