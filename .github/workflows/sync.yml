name: Clean segmentation folder
on:
  workflow_dispatch:

jobs:
  clean:
    runs-on: ubuntu-latest
    steps:
      - name: Clean segmentation folder
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          pip install -q huggingface_hub
          
          python3 << 'EOF'
          import os
          from huggingface_hub import HfApi

          token = os.environ["HF_TOKEN"]
          api = HfApi(token=token)
          repo_id = "shababdd11/sultan-models"
          
          # حذف الملفات الفارغة فقط
          files_to_delete = [
              ".gitkeep",        # فارغ
              "unet.onnx"        # فارغ (0 Bytes)
          ]
          
          for file in files_to_delete:
              try:
                  api.delete_file(
                      path_in_repo=f"segmentation/{file}",
                      repo_id=repo_id,
                      repo_type="model"
                  )
                  print(f"🗑️ Deleted: segmentation/{file}")
              except Exception as e:
                  print(f"❌ Failed to delete {file}: {e}")
          
          print("✅ Cleanup completed!")
          print("Remaining files:")
          print("  - bisenet.onnx (93.6 MB)")
          print("  - bisenet_resnet_18.onnx (53.2 MB)")
          print("  - bisenet_resnet_34.onnx (93.6 MB)")
          EOF
