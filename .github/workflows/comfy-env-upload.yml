name: Comfy-Env-Upload
on:
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Prepare and Upload
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. إنشاء المجلدات المطلوبة تماماً كما تظهر في مستودعك
          mkdir -p checkpoints vae clip
          
          # 2. تحميل الملفات إلى أماكنها الصحيحة
          wget -q "https://huggingface.co/city96/FLUX.1-dev-fp8/resolve/main/flux1-dev-fp8.safetensors" -O "checkpoints/flux1-dev-fp8.safetensors"
          wget -q "https://huggingface.co/black-forest-labs/FLUX.1-schnell/resolve/main/ae.safetensors" -O "vae/ae.safetensors"
          wget -q "https://huggingface.co/comfyanonymous/flux_text_encoders/resolve/main/t5xxl_fp8_e4m3fn.safetensors" -O "clip/t5xxl_fp8_e4m3fn.safetensors"
          
          # 3. تثبيت ورفع
          pip install huggingface-hub
          hf auth login --token $HF_TOKEN
          # رفع المجلدات الحالية إلى المستودع مباشرة
          hf upload shababdd11/sultan-comfy-env . . --commit-message "Upload models"
