name: Comfy-Env-Upload
on:
  workflow_dispatch:

jobs:
  upload-files:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Create Upload Script
        run: |
          cat <<'EOF' > upload.py
          import os
          from huggingface_hub import HfApi
          api = HfApi(token=os.environ['HF_TOKEN'])
          repo = 'shababdd11/sultan-comfy-env'
          files = {
              'checkpoints/flux1-dev-fp8.safetensors': 'checkpoints/flux1-dev-fp8.safetensors',
              'vae/ae.safetensors': 'vae/ae.safetensors',
              'clip/t5xxl_fp8_e4m3fn.safetensors': 'clip/t5xxl_fp8_e4m3fn.safetensors'
          }
          for remote, local in files.items():
              if os.path.exists(local):
                  print(f'📤 رفع {local}...')
                  api.upload_file(path_or_fileobj=local, path_in_repo=remote, repo_id=repo)
          EOF

      - name: Run Upload
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          pip install huggingface-hub
          python3 upload.py
