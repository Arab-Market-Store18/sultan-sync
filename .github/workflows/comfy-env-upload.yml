name: Comfy-Env-Upload
on:
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Process
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          pip install huggingface-hub
          python3 -c "import os; from huggingface_hub import hf_hub_download, HfApi; api = HfApi(token=os.environ['HF_TOKEN']); repo = 'shababdd11/sultan-comfy-env'; files = {'comfyanonymous/flux_dev_fp8_safetensors': 'flux1-dev-fp8.safetensors', 'black-forest-labs/FLUX.1-schnell': 'ae.safetensors', 'comfyanonymous/flux_text_encoders': 't5xxl_fp8_e4m3fn.safetensors'}; [api.upload_file(path_or_fileobj=hf_hub_download(repo_id=r, filename=f, token=os.environ['HF_TOKEN']), path_in_repo=f, repo_id=repo) for r, f in files.items()]"
