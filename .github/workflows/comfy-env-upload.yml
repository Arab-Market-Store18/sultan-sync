name: Force Add Folder
on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Create and Force Push
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "bot@github.com"
          git config --global user.name "GitHub Action"
          
          # إنشاء المجلد
          mkdir -p checkpoints
          touch checkpoints/.gitkeep
          
          # إعداد التغييرات
          git add checkpoints/.gitkeep
          git commit -m "Add checkpoints folder"
          
          # الرفع القسري لتجاوز تعارض المسارات
          git push -f https://shababdd11:$HF_TOKEN@huggingface.co/shababdd11/sultan-comfy-env main
