name: Upload Generation Models Phase 2
on:
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Install tools
        run: pip install -q huggingface_hub

      - name: Download and Upload Models
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python3 << 'EOF'
          import os
          from huggingface_hub import HfApi, snapshot_download
          
          api = HfApi(token=os.environ["HF_TOKEN"])
          repo = "shababdd11/sultan-models"
          
          models = [
              ("stabilityai/stable-diffusion-2-inpainting", "generation/stable-diffusion-2-inpainting"),
              ("lllyasviel/control_v11p_sd15_canny", "generation/controlnet-canny-sd15"),
              ("lllyasviel/control_v11f1p_sd15_depth", "generation/controlnet-depth-sd15"),
              ("h94/IP-Adapter-FaceID", "generation/ip-adapter-faceid-plusv2-sd15"),
              ("h94/IP-Adapter", "generation/ip-adapter-plus-face-sd15"),
              ("InstantX/InstantID", "generation/instantid"),
          ]
          
          for source, target in models:
              print(f"⏳ تحميل {source}...")
              try:
                  path = snapshot_download(source)
                  api.upload_folder(folder_path=path, path_in_repo=target, repo_id=repo)
                  print(f"✅ {target} done")
              except Exception as e:
                  print(f"❌ {source} فشل")
          
          print("🚀 المرحلة الثانية اكتملت!")
          EOF
