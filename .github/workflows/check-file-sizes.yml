name: Check All File Sizes
on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-lates
    steps:
      - name: Install tools
        run: pip install -q huggingface_hub

      - name: Get Sizes
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python3 << 'EOF'
          import os
          from huggingface_hub import HfApi, model_info
          
          api = HfApi(token=os.environ["HF_TOKEN"])
          repo = "shababdd11/sultan-models"
          
          info = model_info(repo, token=os.environ["HF_TOKEN"])
          
          for sibling in info.siblings:
              size = sibling.size or 0
              if size > 0:
                  print(f"✅ {sibling.rfilename} - {size / 1e6:.1f} MB")
              else:
                  print(f"⚠️  {sibling.rfilename} - 0 bytes (فارغ)")
          
          print("🚀 تم!")
          EOF
