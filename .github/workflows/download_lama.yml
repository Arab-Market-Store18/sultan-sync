name: Upload LaMa Model Only

on:
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Download LaMa Model
        run: |
          echo "📥 تحميل نموذج LaMa..."
          wget -q --show-progress \
            -O lama_fp32.onnx \
            https://huggingface.co/SHI-Labs/LaMa-ONNX/resolve/main/models/lama_fp32.onnx
          
          echo "✅ تم التحميل - الحجم: $(du -h lama_fp32.onnx | cut -f1)"
          
      - name: Upload to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          echo "🚀 رفع النموذج إلى Hugging Face..."
          
          curl -X POST \
            -H "Authorization: Bearer $HF_TOKEN" \
            -F "file=@lama_fp32.onnx" \
            -F "path=inpainting/lama_fp32.onnx" \
            https://huggingface.co/api/models/shababdd11/sultan-models/upload
          
          echo ""
          echo "✅ تم الرفع بنجاح!"
          echo "🔗 https://huggingface.co/shababdd11/sultan-models/blob/main/inpainting/lama_fp32.onnx"
