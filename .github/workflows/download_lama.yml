name: Download LaMa Model

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Install huggingface-hub
        run: |
          pip install huggingface-hub
          
      - name: Download and Upload LaMa Model
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          echo "========================================="
          echo "📥 سحب نموذج LaMa من المصدر إلى مستودعك"
          echo "========================================="
          
          # 1. تسجيل الدخول
          huggingface-cli login --token $HF_TOKEN
          
          # 2. سحب النموذج من المصدر
          echo "📥 سحب lama_fp32.onnx من SHI-Labs/LaMa-ONNX..."
          huggingface-cli download SHI-Labs/LaMa-ONNX models/lama_fp32.onnx --local-dir ./temp
          
          # 3. رفع النموذج إلى مستودعك
          echo "🚀 رفع النموذج إلى shababdd11/sultan-models..."
          huggingface-cli upload shababdd11/sultan-models temp/lama_fp32.onnx inpainting/lama_fp32.onnx --token $HF_TOKEN
          
          echo ""
          echo "========================================="
          echo "✅ تم سحب ورفع النموذج بنجاح!"
          echo "🔗 https://huggingface.co/shababdd11/sultan-models/blob/main/inpainting/lama_fp32.onnx"
          echo "========================================="
