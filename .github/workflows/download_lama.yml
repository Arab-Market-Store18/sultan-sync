name: Download Face Swap Models

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Clone repository
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git clone https://shababdd11:${HF_TOKEN}@huggingface.co/shababdd11/sultan-models
          cd sultan-models
          
          echo "========================================="
          echo "📥 تحميل نماذج Face Swap"
          echo "========================================="
          
          # ==========================================
          # إنشاء المجلدات
          # ==========================================
          mkdir -p models
          mkdir -p models/hyperswap
          
          # ==========================================
          # 1. تحميل GPEN-BFR-512.onnx (284 MB)
          # ==========================================
          echo ""
          echo "📥 [1/4] تحميل GPEN-BFR-512.onnx (284 MB)..."
          wget -q --show-progress \
            -O models/GPEN-BFR-512.onnx \
            https://huggingface.co/martintomov/comfy/resolve/main/facerestore_models/GPEN-BFR-512.onnx
          
          echo "   ✅ تم التحميل - الحجم: $(du -h models/GPEN-BFR-512.onnx | cut -f1)"
          
          # ==========================================
          # 2. تحميل hyperswap_1a_256.onnx (403 MB)
          # ==========================================
          echo ""
          echo "📥 [2/4] تحميل hyperswap_1a_256.onnx (403 MB)..."
          wget -q --show-progress \
            -O models/hyperswap/hyperswap_1a_256.onnx \
            https://huggingface.co/facefusion/models-3.3.0/resolve/main/hyperswap_1a_256.onnx
          
          echo "   ✅ تم التحميل - الحجم: $(du -h models/hyperswap/hyperswap_1a_256.onnx | cut -f1)"
          
          # ==========================================
          # 3. تحميل hyperswap_1b_256.onnx (403 MB)
          # ==========================================
          echo ""
          echo "📥 [3/4] تحميل hyperswap_1b_256.onnx (403 MB)..."
          wget -q --show-progress \
            -O models/hyperswap/hyperswap_1b_256.onnx \
            https://huggingface.co/facefusion/models-3.3.0/resolve/main/hyperswap_1b_256.onnx
          
          echo "   ✅ تم التحميل - الحجم: $(du -h models/hyperswap/hyperswap_1b_256.onnx | cut -f1)"
          
          # ==========================================
          # 4. تحميل hyperswap_1c_256.onnx (403 MB)
          # ==========================================
          echo ""
          echo "📥 [4/4] تحميل hyperswap_1c_256.onnx (403 MB)..."
          wget -q --show-progress \
            -O models/hyperswap/hyperswap_1c_256.onnx \
            https://huggingface.co/facefusion/models-3.3.0/resolve/main/hyperswap_1c_256.onnx
          
          echo "   ✅ تم التحميل - الحجم: $(du -h models/hyperswap/hyperswap_1c_256.onnx | cut -f1)"
          
          # ==========================================
          # عرض الملخص
          # ==========================================
          echo ""
          echo "========================================="
          echo "📋 ملخص التحميل:"
          echo "========================================="
          echo ""
          echo "📂 models/"
          ls -lh models/
          echo ""
          echo "📂 models/hyperswap/"
          ls -lh models/hyperswap/
          
          # ==========================================
          # حساب الحجم الإجمالي
          # ==========================================
          TOTAL_SIZE=$(du -sh models/ | cut -f1)
          echo ""
          echo "💾 الحجم الإجمالي: $TOTAL_SIZE"
          
          echo ""
          echo "========================================="
          echo "✅ تم تحميل 4 نماذج بنجاح"
          echo "========================================="
          echo ""
          echo "📋 النماذج المحملة:"
          echo "  1. models/GPEN-BFR-512.onnx"
          echo "  2. models/hyperswap/hyperswap_1a_256.onnx"
          echo "  3. models/hyperswap/hyperswap_1b_256.onnx"
          echo "  4. models/hyperswap/hyperswap_1c_256.onnx"
          
          # ==========================================
          # رفع إلى Hugging Face
          # ==========================================
          echo ""
          echo "🚀 جاري الدفع إلى Hugging Face..."
          
          git add models/
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git commit -m "Add Face Swap models (GPEN + 3 Hyperswap)"
          
          git push
          
          echo ""
          echo "🎉 تم رفع النماذج بنجاح إلى:"
          echo "   https://huggingface.co/shababdd11/sultan-models/tree/main/models"
          echo ""
          echo "📂 هيكل المجلدات:"
          echo "   models/"
          echo "   ├── GPEN-BFR-512.onnx"
          echo "   └── hyperswap/"
          echo "       ├── hyperswap_1a_256.onnx"
          echo "       ├── hyperswap_1b_256.onnx"
          echo "       └── hyperswap_1c_256.onnx"
