name: Download YOLOv5l-face Model

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Clone repository
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git clone https://shababdd11:${HF_TOKEN}@huggingface.co/shababdd11/sultan-models
          cd sultan-models
          
          echo "========================================="
          echo "📥 تحميل نموذج YOLOv5l-face"
          echo "========================================="
          
          # ==========================================
          # إنشاء المجلد
          # ==========================================
          mkdir -p detection
          
          # ==========================================
          # تحميل yolov5l-face.pth (187 MB)
          # ==========================================
          echo ""
          echo "📥 تحميل yolov5l-face.pth (187 MB)..."
          wget -q --show-progress \
            -O detection/yolov5l-face.pth \
            https://huggingface.co/martintomov/comfy/resolve/main/facedetection/yolov5l-face.pth
          
          echo "   ✅ تم التحميل - الحجم: $(du -h detection/yolov5l-face.pth | cut -f1)"
          
          # ==========================================
          # عرض الملخص
          # ==========================================
          echo ""
          echo "========================================="
          echo "📋 ملخص التحميل:"
          echo "========================================="
          echo ""
          echo "📂 detection/"
          ls -lh detection/
          
          echo ""
          echo "========================================="
          echo "✅ تم تحميل النموذج بنجاح"
          echo "========================================="
          echo ""
          echo "📋 النموذج المحمل:"
          echo "  📄 detection/yolov5l-face.pth"
          
          # ==========================================
          # رفع إلى Hugging Face
          # ==========================================
          echo ""
          echo "🚀 جاري الدفع إلى Hugging Face..."
          
          git add detection/
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git commit -m "Add YOLOv5l-face detection model"
          
          git push
          
          echo ""
          echo "🎉 تم رفع النموذج بنجاح إلى:"
          echo "   https://huggingface.co/shababdd11/sultan-models/tree/main/detection"
          echo ""
          echo "📂 هيكل المجلدات:"
          echo "   detection/"
          echo "   └── yolov5l-face.pth"
