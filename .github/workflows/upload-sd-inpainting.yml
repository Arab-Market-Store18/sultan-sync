name: Upload SD Inpainting
on:
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Install tools
        run: pip install -q huggingface_hub

      - name: Download and Upload
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python3 << 'EOF'
          import os
          from huggingface_hub import HfApi, snapshot_download
          
          api = HfApi(token=os.environ["HF_TOKEN"])
          repo = "shababdd11/sultan-models"
          
          print("⏳ تحميل runwayml/stable-diffusion-inpainting...")
          path = snapshot_download("runwayml/stable-diffusion-inpainting")
          api.upload_folder(folder_path=path, path_in_repo="generation/stable-diffusion-2-inpainting", repo_id=repo)
          print("✅ done")
          EOF
