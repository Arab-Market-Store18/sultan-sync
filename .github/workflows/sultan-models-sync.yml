name: Sultan ComfyEnv Uploader Fixed
on:
  workflow_dispatch:

jobs:
  upload-to-private-repo:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: pip install huggingface-hub requests

      - name: Upload to Private Repo
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python3 << 'PYTHON_SCRIPT'
          import os
          import requests
          from huggingface_hub import upload_file

          token = os.environ.get("HF_TOKEN")
          headers = {"Authorization": f"Bearer {token}"} # هذا السطر هو مفتاح الحل
          
          files_to_upload = [
              {
                  "url": "https://huggingface.co/comfyanonymous/flux_dev_fp8_safetensors/resolve/main/flux1-dev-fp8.safetensors",
                  "dest": "checkpoints/flux1-dev-fp8.safetensors"
              }
          ]

          repo_id = "shababdd11/sultan-comfy-env"

          for item in files_to_upload:
              filename = item["dest"].split("/")[-1]
              print(f"📥 جاري تحميل: {filename}...")
              
              # استخدام التوكن في التحميل
              response = requests.get(item["url"], headers=headers, stream=True)
              if response.status_code == 200:
                  with open(filename, "wb") as f:
                      for chunk in response.iter_content(chunk_size=1024*1024):
                          if chunk: f.write(chunk)
                  
                  print(f"📤 جاري الرفع إلى {item['dest']}...")
                  upload_file(
                      path_or_fileobj=filename,
                      path_in_repo=item["dest"],
                      repo_id=repo_id,
                      token=token,
                      commit_message=f"Upload {filename}"
                  )
                  os.remove(filename)
                  print(f"✅ تم بنجاح: {item['dest']}")
              else:
                  print(f"❌ فشل التحميل: {response.status_code}")
          PYTHON_SCRIPT
