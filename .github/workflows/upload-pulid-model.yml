name: Upload PuLID-Flux
on:
  workflow_dispatch:
 
jobs:
  upload-pulid:
    runs-on: ubuntu-latest
    steps:
      - name: Install huggingface-hub
        run: pip install huggingface-hub

      - name: Download and upload PuLID-Flux model
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python3 << 'PYTHON_SCRIPT'
          import os
          import requests
          from huggingface_hub import upload_file
          
          token = os.environ.get("HF_TOKEN")
          if not token:
              raise ValueError("HF_TOKEN environment variable not set")
          
          print("📥 جاري تحميل PuLID-Flux v0.9.1...")
          
          # نموذج PuLID-Flux (الإصدار المستقر v0.9.1)
          url = "https://huggingface.co/guozinan/PuLID/resolve/main/pulid_flux_v0.9.1.safetensors"
          
          print("⏳ جاري التحميل (حجم الملف ~1.6GB)... قد يستغرق وقتاً")
          response = requests.get(url, stream=True)
          
          if response.status_code == 200:
              total_size = int(response.headers.get('content-length', 0))
              downloaded = 0
              
              with open("pulid_flux_v0.9.1.safetensors", "wb") as f:
                  for chunk in response.iter_content(chunk_size=8192):
                      if chunk:
                          f.write(chunk)
                          downloaded += len(chunk)
                          # عرض نسبة التحميل
                          if total_size > 0:
                              percent = (downloaded / total_size) * 100
                              print(f"\r⏳ التحميل: {percent:.1f}%", end="")
              
              print("\n✅ تم تحميل PuLID-Flux model")
              
              print("📤 جاري رفع الملف إلى مستودعك...")
              upload_file(
                  path_or_fileobj="pulid_flux_v0.9.1.safetensors",
                  path_in_repo="pulid/pulid_flux_v0.9.1.safetensors",
                  repo_id="shababdd11/sultan-models",
                  repo_type="model",
                  token=token,
                  commit_message="Add PuLID-Flux v0.9.1 model for face ID preservation"
              )
              print("✅ تم الرفع بنجاح!")
              
              # حذف الملف المحلي لتوفير المساحة
              os.remove("pulid_flux_v0.9.1.safetensors")
              print("🗑️ تم حذف الملف المحلي")
          else:
              print(f"❌ فشل التحميل: {response.status_code}")
          PYTHON_SCRIPT
