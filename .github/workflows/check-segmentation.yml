name: Check segmentation folder
on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Install tools
        run: pip install -q huggingface_hub

      - name: Check segmentation
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python3 << 'EOF'
          import os
          from huggingface_hub import HfApi
          
          api = HfApi(token=os.environ["HF_TOKEN"])
          repo = "shababdd11/sultan-models"
          
          print("📁 محتويات مجلد segmentation:")
          files = api.list_repo_files(repo)
          for f in files:
              if f.startswith("segmentation/"):
                  print(f"  - {f}")
          
          print("🚀 تم!")
          EOF
