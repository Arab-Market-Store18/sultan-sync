name: Download and Upload FLUX.2-klein-4B (GGUF)
on:
  workflow_dispatch:

jobs:
  transfer-gguf-model:
    runs-on: ubuntu-latest
    steps:
      - name: Install tools
        run: |
          pip install -q huggingface_hub
          sudo apt-get update
          sudo apt-get install -y git-lfs
          
      - name: Download GGUF model
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python3 << 'EOF'
          import os
          from huggingface_hub import snapshot_download
          
          # مصدر GGUF (استخدم مصدر GGUF حقيقي بدلاً من هذا)
          source_repo = "TheBloke/FLUX.2-klein-4B-GGUF"
          local_dir = "./gguf_model"
          
          print("📥 جاري تحميل نموذج GGUF...")
          snapshot_download(
              repo_id=source_repo,
              local_dir=local_dir,
              allow_patterns=["*.gguf"]
          )
          print("✅ تم تحميل GGUF بنجاح")
          EOF
          
      - name: Upload GGUF to sultan-models
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python3 << 'EOF'
          import os
          from huggingface_hub import HfApi, upload_folder
          
          api = HfApi(token=os.environ["HF_TOKEN"])
          target_repo = "shababdd11/sultan-models"
          target_folder = "generation/flux2-klein-4b-gguf"
          
          print("📤 جاري رفع نموذج GGUF...")
          upload_folder(
              folder_path="./gguf_model",
              repo_id=target_repo,
              path_in_repo=target_folder,
              repo_type="model",
              commit_message="إضافة نموذج FLUX.2-klein-4B بصيغة GGUF"
          )
          
          print(f"✅ تم الرفع إلى {target_repo}/{target_folder}")
          EOF
