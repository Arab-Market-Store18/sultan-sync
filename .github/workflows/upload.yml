name: Download facexlib Models

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Clone repository
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git clone https://shababdd11:${HF_TOKEN}@huggingface.co/shababdd11/sultan-models
          cd sultan-models
          
          echo "========================================="
          echo "📥 تحميل نماذج facexlib"
          echo "========================================="
          
          # إنشاء المجلد
          mkdir -p facexlib/weights
          
          # 1. تحميل detection_Resnet50_Final.pth (~109 MB)
          echo "📥 تحميل detection_Resnet50_Final.pth..."
          wget -q --show-progress \
            -O facexlib/weights/detection_Resnet50_Final.pth \
            https://github.com/xinntao/facexlib/releases/download/v0.1.0/detection_Resnet50_Final.pth
          
          # 2. تحميل parsing_parsenet.pth (~85 MB)
          echo "📥 تحميل parsing_parsenet.pth..."
          wget -q --show-progress \
            -O facexlib/weights/parsing_parsenet.pth \
            https://github.com/xinntao/facexlib/releases/download/v0.2.2/parsing_parsenet.pth
          
          # 3. تحميل vgg16.pth (~500 MB)
          echo "📥 تحميل vgg16.pth..."
          wget -q --show-progress \
            -O facexlib/weights/vgg16.pth \
            https://github.com/xinntao/facexlib/releases/download/v0.1.0/vgg16.pth
          
          echo ""
          echo "========================================="
          echo "✅ تم التحميل بنجاح"
          echo "========================================="
          
          # التحقق من الملفات
          ls -lh facexlib/weights/
          
          # رفع إلى Hugging Face
          git add facexlib/
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git commit -m "Add facexlib models (detection, parsing, vgg16)" || echo "No changes"
          git push
          
          echo ""
          echo "🎉 تم رفع النماذج بنجاح!"
