name: Upload Flux Model Direct
on:
  workflow_dispatch:

jobs:
  upload-model:
    runs-on: ubuntu-latest
    steps:
      - name: Install huggingface_hub
        run: |
          pip install huggingface_hub

      - name: Download and upload
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # تحميل النموذج
          wget https://huggingface.co/Comfy-Org/flux1-dev/resolve/main/flux1-dev-fp8.safetensors
          
          # رفع مباشر إلى مستودعك
          huggingface-cli upload shababdd11/sultan-comfy-env flux1-dev-fp8.safetensors checkpoints/flux1-dev-fp8.safetensors --token ${{ secrets.HF_TOKEN }}
