name: Upload Xet Model
on:
  workflow_dispatch:

jobs:
  upload-xet:
    runs-on: ubuntu-latest
    steps:
      - name: Install Xet
        run: |
          pip install git-xet
          git xet install

      - name: Clone and Upload
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # تحميل المستودع باستخدام خوارزمية Xet
          git clone https://huggingface.co/AiAF/flux1-dev-fp8.safetensors model_temp
          
          # إعداد المستودع الخاص بك للرفع
          git clone https://shababdd11:${HF_TOKEN}@huggingface.co/shababdd11/sultan-comfy-env my_repo
          mkdir -p my_repo/checkpoints
          cp model_temp/flux1-dev-fp8.safetensors my_repo/checkpoints/
          
          # الرفع إلى مستودعك
          cd my_repo
          git config user.email "sultan@example.com"
          git config user.name "Sultan"
          git add checkpoints/flux1-dev-fp8.safetensors
          git commit -m "Add Xet model"
          git push
