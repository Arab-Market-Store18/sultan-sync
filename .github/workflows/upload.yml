name: Explore sultan-comfy-env
on:
  workflow_dispatch:

jobs:
  explore-repo:
    runs-on: ubuntu-latest
    steps:
      - name: Clone repository (metadata only)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git clone --depth 1 --filter=blob:none \
            https://shababdd11:${HF_TOKEN}@huggingface.co/shababdd11/sultan-comfy-env
          cd sultan-comfy-env
          echo "========================================="
          echo "📁 جميع المجلدات والملفات:"
          echo "========================================="
          find . -type f | sort
          echo ""
          echo "========================================="
          echo "📊 الإحصائيات:"
          echo "========================================="
          echo "عدد المجلدات: $(find . -type d | wc -l)"
          echo "عدد الملفات: $(find . -type f | wc -l)"
