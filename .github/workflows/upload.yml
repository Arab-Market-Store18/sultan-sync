name: Show Model Tree Structure
on:
  workflow_dispatch:

jobs:
  show-tree:
    runs-on: ubuntu-latest
    steps:
      - name: Clone and show tree
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git clone --depth 1 --filter=blob:none \
            https://shababdd11:${HF_TOKEN}@huggingface.co/shababdd11/sultan-comfy-env
          cd sultan-comfy-env
          echo "========================================="
          echo "🌳 هيكل النماذج:"
          echo "========================================="
          find . -type f -name "*.safetensors" -o -name "*.bin" -o -name "*.ckpt" | sed 's|[^/]*/| |g'
