name: Download vgg16.pth

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Clone and download
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git clone https://shababdd11:${HF_TOKEN}@huggingface.co/shababdd11/sultan-models
          cd sultan-models
          
          echo "📁 Creating facexlib/weights/..."
          mkdir -p facexlib/weights
          
          echo "📥 Downloading vgg16.pth (500 MB)..."
          curl -L --retry 5 --retry-delay 10 \
            -o facexlib/weights/vgg16.pth \
            https://github.com/xinntao/facexlib/releases/download/v0.1.0/vgg16.pth
          
          echo "✅ Download complete"
          ls -lh facexlib/weights/
          
          git add facexlib/
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git commit -m "Add vgg16.pth" || echo "No changes"
          git push
          
          echo "🎉 Upload complete!"
