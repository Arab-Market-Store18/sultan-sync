name: Show Model Tree

on:
  workflow_dispatch:

jobs:
  show-tree:
    runs-on: ubuntu-latest
    steps:
      - name: Install git-lfs
        run: |
          sudo apt-get update
          sudo apt-get install -y git-lfs
          git lfs install
      
      - name: Clone repository without LFS filters
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # استنساخ بدون استخدام مرشحات LFS (GIT_LFS_SKIP_SMUDGE)
          GIT_LFS_SKIP_SMUDGE=1 git clone --depth 1 \
            https://shababdd11:${HF_TOKEN}@huggingface.co/shababdd11/sultan-models
          
          cd sultan-models
          
          echo "========================================="
          echo "🌳 هيكل النماذج في المستودع:"
          echo "========================================="
          find . -type f \( -name "*.safetensors" -o -name "*.bin" -o -name "*.ckpt" -o -name "*.pth" -o -name "*.pt" -o -name "*.onnx" \) 2>/dev/null | sed 's|^\./||' | head -50
          
          echo ""
          echo "========================================="
          echo "🔍 البحث عن النماذج المفقودة (facexlib):"
          echo "========================================="
          
          MISSING_MODELS=(
            "detection_Resnet50_Final.pth"
            "parsing_parsenet.pth"
            "vgg16.pth"
          )
          
          for model in "${MISSING_MODELS[@]}"; do
            echo ""
            if find . -type f -name "$model" 2>/dev/null | grep -q .; then
              echo "✅ $model -> موجود"
              find . -type f -name "$model" -exec ls -lh {} \;
            else
              echo "❌ $model -> غير موجود في المستودع"
              echo "   ⚠️ هذا النموذج سيتم تحميله من الإنترنت أثناء التشغيل"
            fi
          done
          
          echo ""
          echo "========================================="
          echo "📊 إحصائيات النماذج:"
          echo "========================================="
          
          echo "ملفات ONNX: $(find . -name "*.onnx" 2>/dev/null | wc -l)"
          echo "ملفات PyTorch (.pth, .pt): $(find . -name "*.pth" -o -name "*.pt" 2>/dev/null | wc -l)"
          echo "ملفات SAFETENSORS: $(find . -name "*.safetensors" 2>/dev/null | wc -l)"
          echo "ملفات BIN: $(find . -name "*.bin" 2>/dev/null | wc -l)"
          echo "ملفات CKPT: $(find . -name "*.ckpt" 2>/dev/null | wc -l)"
          
          echo ""
          echo "========================================="
          echo "💾 هيكل المجلدات:"
          echo "========================================="
          ls -la
