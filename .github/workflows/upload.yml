name: Upload Large Files
on:
  workflow_dispatch:

jobs:
  upload-to-hf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install HF Hub
        run: pip install huggingface_hub

      - name: Upload File
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python -c "
          from huggingface_hub import hf_hub_download, HfApi
          import os
          
          print('Downloading...')
          file_path = hf_hub_download(
              repo_id='AIAF/flux1-dev-fp8', 
              filename='flux1-dev-fp8.safetensors', 
              token=os.environ['HF_TOKEN']
          )
          
          print('Uploading...')
          api = HfApi()
          api.upload_file(
              path_or_fileobj=file_path,
              path_in_repo='checkpoints/flux1-dev-fp8.safetensors',
              repo_id='shababdd11/sultan-comfy-env',
              token=os.environ['HF_TOKEN']
          )
          print('Done!')
          "
