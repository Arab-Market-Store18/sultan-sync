name: Download vgg16.pth

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Clone repository
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git clone https://shababdd11:${HF_TOKEN}@huggingface.co/shababdd11/sultan-models
          cd sultan-models
          
          # حذف الملف التالف إذا كان موجوداً
          rm -f facexlib/weights/vgg16.pth
          
          # إنشاء المجلد
          mkdir -p facexlib/weights
          
          echo "📥 Downloading vgg16.pth (500 MB)..."
          
          # استخدام wget مع إعادة المحاولة
          wget --tries=5 --timeout=60 --continue \
            -O facexlib/weights/vgg16.pth \
            https://github.com/xinntao/facexlib/releases/download/v0.1.0/vgg16.pth
          
          # التحقق من الحجم
          SIZE=$(stat -c%s facexlib/weights/vgg16.pth 2>/dev/null || echo "0")
          echo "File size: $SIZE bytes"
          
          if [ "$SIZE" -lt 400000000 ]; then
            echo "❌ Download failed - file too small ($SIZE bytes)"
            exit 1
          fi
          
          echo "✅ Download successful!"
          ls -lh facexlib/weights/
          
          git add facexlib/
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git commit -m "Add vgg16.pth" || echo "No changes"
          git push
          
          echo "🎉 Upload complete!"
