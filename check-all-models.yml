name: Check All Sultan Models
on:
  workflow_dispatch:
 
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Install tools
        run: pip install -q huggingface_hub

      - name: List All Files
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python3 << 'EOF'
          import os
          from huggingface_hub import HfApi
          
          api = HfApi(token=os.environ["HF_TOKEN"])
          repo = "shababdd11/sultan-models"
          
          print("📁 جميع محتويات sultan-models:\n")
          files = api.list_repo_files(repo)
          for f in sorted(files):
              print(f"  {f}")
          
          print(f"\n📊 العدد الإجمالي: {len(files)}")
          EOF
